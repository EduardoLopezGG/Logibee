<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - El Panal de la Abejita</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Tipografía infantil redondeada -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Iconos divertidos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            user-select: none;
        }

        body {
            background: url('watermarked_img_9780776355970194250.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.12);
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(253, 213, 189, 0.4);
            z-index: 1;
        }

        .btn-honey {
            background: linear-gradient(135deg, #ffca28, #ff9800);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-honey:hover {
            background: linear-gradient(135deg, #ffd54f, #fb8c00);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
            transform: scale(1.03);
        }

        @keyframes floatBee {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        .animate-bee {
            animation: floatBee 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

    <main class="w-full max-w-md glass-panel rounded-[28px] p-8 sm:p-10 text-center relative">
        <header class="mb-5">
            <span class="text-6xl inline-block mb-3 animate-bee">🐝</span>
            <h1 class="text-3xl font-black text-[#4a3319] tracking-wide">¡Crea tu Cuenta!</h1>
            <p class="text-sm font-bold text-[#7c6248] mt-1">Regístrate para guardar las gotitas de miel de tu hijo</p>
        </header>

        <!-- Mensajes de Alerta Internos -->
        <div id="alertBox" class="hidden mb-4 p-3.5 rounded-xl border font-bold text-xs text-left"></div>

        <!-- FORMULARIO DE REGISTRO -->
        <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-black text-[#4a3319] mb-1">Tu nombre completo</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-user absolute left-4 text-[#7c6248]"></i>
                    <input type="text" id="fullname" required placeholder="Ej: mamá de Juanito" class="w-full p-3.5 pl-11 border-2 border-[#e6dfd5] focus:border-amber-400 rounded-2xl font-bold outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-[#4a3319] mb-1">Correo electrónico</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-envelope absolute left-4 text-[#7c6248]"></i>
                    <input type="email" id="email" required placeholder="Ej: mama@colmena.com" class="w-full p-3.5 pl-11 border-2 border-[#e6dfd5] focus:border-amber-400 rounded-2xl font-bold outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-[#4a3319] mb-1">Crea una contraseña</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-lock absolute left-4 text-[#7c6248]"></i>
                    <input type="password" id="password" required placeholder="Contraseña segura" class="w-full p-3.5 pl-11 border-2 border-[#e6dfd5] focus:border-amber-400 rounded-2xl font-bold outline-none transition-all">
                </div>
            </div>

            <button type="submit" class="w-full py-4 btn-honey font-black rounded-2xl text-base flex items-center justify-center gap-2 mt-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> ¡Listo, Registrarse!
            </button>
        </form>

        <footer class="mt-6 pt-5 border-t border-dashed border-amber-100">
            <p class="text-xs font-bold text-[#7c6248]">
                ¿Ya tienes una cuenta registrada? 
                <a href="login.html" class="text-amber-600 hover:text-amber-700 font-extrabold underline decoration-dashed ml-1">Inicia sesión aquí</a>
            </p>
        </footer>
    </main>

    <script>
        const alertBox = document.getElementById('alertBox');

        function showAlert(msg, isSuccess = false) {
            alertBox.classList.remove('hidden', 'bg-rose-50', 'border-rose-200', 'text-rose-700', 'bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
            if (isSuccess) {
                alertBox.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
            } else {
                alertBox.classList.add('bg-rose-50', 'border-rose-200', 'text-rose-700');
            }
            alertBox.innerText = msg;
        }

        async function handleRegistration(event) {
            event.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // LLamada a tu servidor backend real
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullname, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('logged_in_user_id', data.user.id);
                    localStorage.setItem('logged_in_user', data.user.name);
                    showAlert("✨ ¡Usuario registrado con éxito! Entrando a la colmena...", true);
                    
                    setTimeout(() => {
                        window.location.href = 'perfiles.html';
                    }, 1200);
                } else {
                    showAlert("⚠️ " + data.error);
                }
            } catch (error) {
                console.error("Error de red:", error);
                showAlert("⚠️ Error de conexión. ¿Iniciaste tu servidor de Node.js?");
            }
        }
    </script>
</body>
</html>
