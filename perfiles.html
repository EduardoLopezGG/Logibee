<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién va a jugar hoy? - El Panal de la Abejita</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Tipografía infantil redondeada -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Iconos divertidos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background: url('watermarked_img_9780776355970194250.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.12);
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(253, 213, 189, 0.4);
            z-index: 1;
        }

        .btn-honey {
            background: linear-gradient(135deg, #ffca28, #ff9800);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-honey:hover {
            background: linear-gradient(135deg, #ffd54f, #fb8c00);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
            transform: scale(1.05);
        }

        @keyframes floatBee {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        .animate-bee {
            animation: floatBee 3s ease-in-out infinite;
        }

        .profile-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 15px 25px rgba(255, 152, 0, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

    <main class="w-full max-w-3xl glass-panel rounded-[28px] p-6 sm:p-10 text-center relative">
        <header class="mb-8">
            <span class="text-6xl inline-block mb-3 animate-bee">🐝</span>
            <h1 class="text-3xl sm:text-4xl font-black text-[#4a3319] tracking-wide">El Panal de la Abejita</h1>
            <p class="text-base sm:text-lg font-bold text-[#7c6248] mt-1">¿Quién va a jugar hoy en la colmena? 🌸</p>
        </header>

        <section class="mb-8">
            <div id="profilesGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-6 justify-center">
                <!-- Se cargan dinámicamente -->
            </div>
        </section>

        <footer class="border-t-2 border-dashed border-amber-100 pt-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <button onclick="toggleManageMode()" id="manageBtn" class="px-5 py-2.5 rounded-xl border-2 border-[#e6dfd5] bg-white text-[#7c6248] hover:text-[#4a3319] hover:border-yellow-400 font-bold text-sm transition-all flex items-center gap-2 active:scale-95">
                <i class="fa-solid fa-user-gear"></i> Modo Administrar
            </button>

            <button onclick="logoutParent()" class="px-5 py-2.5 rounded-xl bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold text-sm transition-all flex items-center gap-2 active:scale-95 border border-rose-200">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión Padre
            </button>
        </footer>
    </main>

    <!-- MODAL CREAR PERFIL (Añadir) -->
    <div id="addProfileModal" class="fixed inset-0 bg-black/65 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[28px] w-full max-w-md p-6 sm:p-8 shadow-2xl border-4 border-amber-300 transform scale-95 transition-transform duration-300 relative">
            <button onclick="closeAddModal()" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 hover:text-slate-700 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <h3 class="text-2xl font-black text-[#4a3319] mb-4 text-center flex items-center justify-center gap-2">
                👶 Crear Nuevo Personaje
            </h3>

            <form id="addProfileForm" onsubmit="handleCreateProfile(event)" class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-black text-[#4a3319] mb-2">¿Cómo se llama tu abejita? *</label>
                    <input type="text" id="kidNameInput" required maxlength="20" placeholder="Ej: Juanito" class="w-full p-3.5 border-2 border-[#e6dfd5] focus:border-amber-400 rounded-2xl font-bold outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-black text-[#4a3319] mb-2">¿Cuántos años tiene? *</label>
                    <input type="number" id="kidAge" required min="2" max="12" placeholder="Ej: 5" class="w-full p-3.5 border-2 border-[#e6dfd5] focus:border-amber-400 rounded-2xl font-bold outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-black text-[#4a3319] mb-3">Elige tu avatar de la suerte:</label>
                    <div class="grid grid-cols-4 gap-3" id="avatarsContainer">
                        <!-- Generado dinámicamente -->
                    </div>
                </div>

                <button type="submit" class="w-full py-4 btn-honey font-black rounded-2xl text-base flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> ¡Listo, a Volar!
                </button>
            </form>
        </div>
    </div>

    <script>
        // Sistema de audio integrado
        let audioCtx = null;
        let isManageMode = false;
        let selectedAvatar = '🐝';

        const availableAvatars = [
            { emoji: '🐝', color: 'bg-amber-100 border-amber-300 text-amber-600' },
            { emoji: '🐻', color: 'bg-orange-100 border-orange-300 text-orange-700' },
            { emoji: '🐨', color: 'bg-slate-100 border-slate-300 text-slate-600' },
            { emoji: '🐯', color: 'bg-yellow-100 border-yellow-300 text-yellow-600' },
            { emoji: '🐰', color: 'bg-pink-100 border-pink-300 text-pink-600' },
            { emoji: '🦊', color: 'bg-red-100 border-red-300 text-red-500' },
            { emoji: '🦁', color: 'bg-amber-200 border-amber-400 text-amber-700' },
            { emoji: '🐸', color: 'bg-emerald-100 border-emerald-300 text-emerald-600' }
        ];

        // Verificar sesión del padre o aplicar cuenta de pruebas en desarrollo local
        let userId = localStorage.getItem('logged_in_user_id');
        if (!userId) {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') {
                userId = 'usuario-prueba-colmena';
                localStorage.setItem('logged_in_user_id', userId);
                localStorage.setItem('logged_in_user', 'Padre de Pruebas');
            } else {
                window.location.href = 'login.html';
            }
        }

        // Sintetizador nativo de efectos de sonido
        function playSound(type) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'hover') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(320, now);
                    osc.frequency.exponentialRampToValueAtTime(480, now + 0.1);
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start();
                    osc.stop(now + 0.1);
                } else if (type === 'select') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                    gain.gain.setValueAtTime(0.06, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                } else if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(260, now);
                    osc.frequency.exponentialRampToValueAtTime(520, now + 0.08);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                    osc.start();
                    osc.stop(now + 0.08);
                } else if (type === 'delete') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.start();
                    osc.stop(now + 0.25);
                }
            } catch (e) {
                console.warn("AudioContext bloqueado:", e);
            }
        }

        window.onload = function() {
            loadKidProfiles();
            renderAvatarChoices();
        };

        // Cargar perfiles de la base de datos (con fallback local)
        async function loadKidProfiles() {
            try {
                const response = await fetch(`/api/users/${userId}/profiles`);
                const data = await response.json();

                if (data.success) {
                    renderProfiles(data.profiles);
                } else {
                    useOfflineFallback();
                }
            } catch (error) {
                console.warn("Backend desconectado. Cargando perfiles locales offline.");
                useOfflineFallback();
            }
        }

        function useOfflineFallback() {
            let localData = JSON.parse(localStorage.getItem(`local_profiles_${userId}`));
            if (!localData || localData.length === 0) {
                localData = [
                    { id: '1', nombre: 'Juanito 🐝', edad: 5, avatar: '🐝' },
                    { id: '2', nombre: 'Sofía 🐰', edad: 6, avatar: '🐰' }
                ];
                localStorage.setItem(`local_profiles_${userId}`, JSON.stringify(localData));
            }
            renderProfiles(localData);
        }

        function renderProfiles(profiles) {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = '';

            profiles.forEach(profile => {
                const card = document.createElement('div');
                card.className = "profile-card cursor-pointer bg-white border-2 border-[#e6dfd5] rounded-3xl p-5 flex flex-col items-center justify-between relative min-h-[160px]";
                card.setAttribute('onmouseenter', 'playSound("hover")');
                
                let deleteBadge = '';
                if (isManageMode) {
                    deleteBadge = `
                        <button onclick="handleDeleteProfile('${profile.id}', event)" class="absolute -top-2.5 -right-2.5 w-8 h-8 rounded-full bg-rose-500 hover:bg-rose-600 text-white flex items-center justify-center shadow-md active:scale-90 transition-all z-20">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    `;
                }

                const matchedAvatar = availableAvatars.find(a => a.emoji === profile.avatar) || availableAvatars[0];

                card.innerHTML = `
                    ${deleteBadge}
                    <div onclick="selectChildProfile('${profile.id}', '${profile.nombre}', '${profile.avatar}', '${matchedAvatar.color}')" class="w-full flex flex-col items-center">
                        <div class="w-20 h-20 rounded-2xl ${matchedAvatar.color} border-2 flex items-center justify-center text-4xl shadow-sm mb-3">
                            ${profile.avatar}
                        </div>
                        <h4 class="font-black text-base text-[#4a3319] truncate max-w-full">${profile.nombre}</h4>
                        <span class="text-xs font-bold text-[#7c6248] mt-0.5">${profile.edad} años</span>
                    </div>
                `;

                grid.appendChild(card);
            });

            // Tarjeta de añadir perfil
            const addCard = document.createElement('div');
            addCard.className = "profile-card cursor-pointer bg-amber-50/50 hover:bg-amber-50 border-2 border-dashed border-amber-300 rounded-3xl p-5 flex flex-col items-center justify-center min-h-[160px]";
            addCard.setAttribute('onmouseenter', 'playSound("hover")');
            addCard.onclick = openAddModal;

            addCard.innerHTML = `
                <div class="w-14 h-14 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 mb-3 text-2xl border border-amber-200">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h4 class="font-black text-sm text-[#4a3319]">Añadir Perfil</h4>
                <span class="text-[10px] font-bold text-[#7c6248] mt-0.5">Crear personaje</span>
            `;

            grid.appendChild(addCard);
        }

        function selectChildProfile(id, name, avatar, color) {
            if (isManageMode) return;
            playSound('select');

            const activeProfile = { id, name, avatar, color };
            localStorage.setItem('active_kid_profile', JSON.stringify(activeProfile));

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 300);
        }

        function renderAvatarChoices() {
            const container = document.getElementById('avatarsContainer');
            container.innerHTML = '';

            availableAvatars.forEach(avatar => {
                const btn = document.createElement('button');
                btn.type = "button";
                btn.className = `w-12 h-12 rounded-xl flex items-center justify-center text-2xl border-2 transition-all active:scale-90 ${avatar.color}`;
                btn.innerText = avatar.emoji;

                if (avatar.emoji === selectedAvatar) {
                    btn.classList.add('ring-4', 'ring-amber-400');
                }

                btn.onclick = () => {
                    playSound('pop');
                    selectedAvatar = avatar.emoji;
                    renderAvatarChoices();
                };

                container.appendChild(btn);
            });
        }

        async function handleCreateProfile(event) {
            event.preventDefault();
            const nombre = document.getElementById('kidNameInput').value;
            const edad = parseInt(document.getElementById('kidAge').value);

            try {
                const response = await fetch('/api/profiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, nombre, edad, avatar: selectedAvatar })
                });

                const data = await response.json();

                if (data.success) {
                    onProfileCreationSuccess();
                } else {
                    saveProfileOffline(nombre, edad);
                }
            } catch (error) {
                console.warn("No se pudo conectar al servidor. Guardando perfil de forma local.");
                saveProfileOffline(nombre, edad);
            }
        }

        function saveProfileOffline(nombre, edad) {
            let localData = JSON.parse(localStorage.getItem(`local_profiles_${userId}`)) || [];
            const newProfile = {
                id: Date.now().toString(),
                nombre,
                edad,
                avatar: selectedAvatar
            };
            localData.push(newProfile);
            localStorage.setItem(`local_profiles_${userId}`, JSON.stringify(localData));
            onProfileCreationSuccess();
        }

        function onProfileCreationSuccess() {
            playSound('select');
            closeAddModal();
            loadKidProfiles();
            document.getElementById('addProfileForm').reset();
            selectedAvatar = '🐝';
        }

        async function handleDeleteProfile(profileId, event) {
            event.stopPropagation();
            
            if (confirm("¿Estás seguro de que deseas borrar este personaje del panal?")) {
                try {
                    const response = await fetch(`/api/profiles/${profileId}`, { method: 'DELETE' });
                    const data = await response.json();

                    if (data.success) {
                        playSound('delete');
                        loadKidProfiles();
                    } else {
                        deleteProfileOffline(profileId);
                    }
                } catch (error) {
                    deleteProfileOffline(profileId);
                }
            }
        }

        function deleteProfileOffline(profileId) {
            let localData = JSON.parse(localStorage.getItem(`local_profiles_${userId}`)) || [];
            localData = localData.filter(p => p.id !== profileId);
            localStorage.setItem(`local_profiles_${userId}`, JSON.stringify(localData));
            playSound('delete');
            loadKidProfiles();
        }

        function openAddModal() {
            playSound('pop');
            const modal = document.getElementById('addProfileModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeAddModal() {
            playSound('pop');
            const modal = document.getElementById('addProfileModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function toggleManageMode() {
            playSound('pop');
            isManageMode = !isManageMode;
            const btn = document.getElementById('manageBtn');

            if (isManageMode) {
                btn.className = "px-5 py-2.5 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-700 font-bold text-sm transition-all flex items-center gap-2 active:scale-95 shadow-sm";
                btn.innerHTML = `<i class="fa-solid fa-lock"></i> Salir de Ajustes`;
            } else {
                btn.className = "px-5 py-2.5 rounded-xl border-2 border-[#e6dfd5] bg-white text-[#7c6248] hover:text-[#4a3319] hover:border-yellow-400 font-bold text-sm transition-all flex items-center gap-2 active:scale-95";
                btn.innerHTML = `<i class="fa-solid fa-user-gear"></i> Modo Administrar`;
            }

            loadKidProfiles();
        }

        function logoutParent() {
            playSound('pop');
            localStorage.removeItem('logged_in_user_id');
            localStorage.removeItem('logged_in_user');
            localStorage.removeItem('active_kid_profile');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
