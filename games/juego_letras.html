<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmena de Letras - El Panal de la Abejita</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Tipografía infantil redondeada -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Iconos divertidos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background: url('watermarked_img_9780776355970194250.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(253, 213, 189, 0.4);
            z-index: 1;
        }

        .btn-honey {
            background: linear-gradient(135deg, #ffca28, #ff9800);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-honey:hover {
            background: linear-gradient(135deg, #ffd54f, #fb8c00);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
            transform: scale(1.05);
        }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        .bubble-animation {
            animation: floatBubble 4s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .confetti-piece {
            position: absolute;
            animation: fall 3s linear infinite;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="confettiContainer" class="absolute inset-0 pointer-events-none overflow-hidden z-40 hidden"></div>

    <main class="w-full max-w-2xl glass-panel rounded-[28px] p-6 sm:p-8 text-center relative flex flex-col justify-between min-h-[580px]">
        
        <header class="flex flex-col sm:flex-row items-center justify-between gap-3 pb-4 border-b-2 border-dashed border-amber-100 z-10">
            <div class="flex items-center gap-2.5">
                <div class="w-11 h-11 rounded-xl flex items-center justify-center text-2xl bg-amber-100 border border-yellow-300">🔤</div>
                <div class="text-left">
                    <p class="text-xs font-bold text-[#7c6248]">Misión del día</p>
                    <h2 class="text-base font-black text-[#4a3319]">Colmena de Letras</h2>
                </div>
            </div>

            <button onclick="exitToDashboard()" class="px-4 py-2 rounded-xl border-2 border-[#e6dfd5] bg-white text-[#7c6248] hover:text-[#4a3319] hover:border-[#ffca28] font-bold text-xs transition-all flex items-center gap-1.5 active:scale-95">
                <i class="fa-solid fa-house"></i> Volver
            </button>
        </header>

        <section class="my-6 flex-grow flex flex-col justify-center items-center relative z-10">
            <p class="text-lg sm:text-xl font-bold text-[#4a3319] mb-4">¿Qué letra falta para completar la palabra? 🍯</p>
            
            <div class="w-full max-w-lg p-6 bg-gradient-to-b from-amber-50/40 to-yellow-50/40 border-2 border-amber-200 rounded-3xl relative flex flex-col items-center justify-center mb-6 shadow-inner">
                <span id="conceptEmoji" class="text-7xl mb-4 drop-shadow-md select-none transition-transform duration-300 hover:scale-110">🍎</span>
                <div id="wordDisplay" class="flex justify-center gap-3 mt-2 flex-wrap"></div>
            </div>

            <div class="flex justify-center w-full max-w-md">
                <div id="letterChoices" class="flex justify-center gap-3 sm:gap-4 flex-wrap w-full"></div>
            </div>
        </section>

        <footer class="mt-2 pt-4 border-t border-[#e6dfd5] flex flex-col items-center gap-3 relative z-10">
            <div class="w-full max-w-xs flex items-center gap-2">
                <span class="text-xs font-bold text-[#7c6248]">Progreso:</span>
                <div class="flex-grow bg-[#e6dfd5] h-3.5 rounded-full overflow-hidden p-[2px]">
                    <div id="gameProgress" class="bg-gradient-to-r from-amber-300 to-amber-500 h-full w-0 rounded-full transition-all duration-300"></div>
                </div>
                <span id="roundCounter" class="text-xs font-bold text-[#4a3319]">0/3</span>
            </div>
            <p id="motivationalMessage" class="text-xs text-[#7c6248] font-bold italic">✨ ¡Selecciona la burbuja correcta para endulzar el panal!</p>
        </footer>
    </main>

    <!-- VENTANA MODAL DE VICTORIA -->
    <div id="victoryModal" class="fixed inset-0 bg-black/65 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[28px] w-full max-w-sm p-6 sm:p-8 text-center shadow-2xl border-4 border-yellow-400 transform scale-95 transition-transform duration-300 relative">
            <div class="text-7xl mb-4 animate-bounce">🏆</div>
            <h3 class="text-2xl font-black text-[#4a3319] mb-2">¡Súper Escritor! 🎉</h3>
            <p id="victoryMessage" class="text-base font-bold text-[#7c6248] mb-6">¡Has completado todas las palabras con éxito! Eres un campeón de la ortografía en el panal.</p>
            <button onclick="exitToDashboard()" class="w-full py-3.5 btn-honey font-black rounded-xl text-base flex items-center justify-center gap-2">
                <i class="fa-solid fa-home"></i> Volver al Tablero
            </button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        const wordsPool = [
            { word: "MIEL", emoji: "🍯" },
            { word: "FLOR", emoji: "🌸" },
            { word: "OSITO", emoji: "🧸" },
            { word: "ARBOL", emoji: "🌳" },
            { word: "SOL", emoji: "☀️" },
            { word: "CASA", emoji: "🏡" }
        ];

        let selectedWords = [];
        let currentWordIndex = 0;
        let missingLetterIndex = 0;
        let missingLetterChar = "";
        const totalRounds = 3;

        const successPhrases = [
            "⭐ ¡Eres súper inteligente!",
            "🍯 ¡Riquísimo! Una gotita de miel más.",
            "🐝 ¡Las abejitas del panal celebran contigo!",
            "🌸 ¡Completado de forma mágica!"
        ];

        window.onload = function() {
            initLetrasGame();
        };

        function playSfx(type) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(783, now + 0.2);
                    gain.gain.setValueAtTime(0.08, now);
                    osc.start(); osc.stop(now + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    gain.gain.setValueAtTime(0.1, now);
                    osc.start(); osc.stop(now + 0.25);
                } else if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    gain.gain.setValueAtTime(0.05, now);
                    osc.start(); osc.stop(now + 0.08);
                }
            } catch (e) {}
        }

        function initLetrasGame() {
            currentWordIndex = 0;
            selectedWords = [...wordsPool].sort(() => Math.random() - 0.5).slice(0, totalRounds);
            document.getElementById('confettiContainer').classList.add('hidden');
            updateProgress();
            loadRound();
        }

        function loadRound() {
            const currentWordObj = selectedWords[currentWordIndex];
            const word = currentWordObj.word;
            missingLetterIndex = Math.floor(Math.random() * word.length);
            missingLetterChar = word[missingLetterIndex];

            document.getElementById('conceptEmoji').innerText = currentWordObj.emoji;

            const wordDisplay = document.getElementById('wordDisplay');
            wordDisplay.innerHTML = '';

            for (let i = 0; i < word.length; i++) {
                const charBox = document.createElement('div');
                if (i === missingLetterIndex) {
                    charBox.id = "missingBox";
                    charBox.className = "w-12 h-12 sm:w-14 sm:h-14 bg-amber-50 border-4 border-dashed border-yellow-400 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl font-black text-[#ff9800] animate-pulse";
                    charBox.innerText = "?";
                } else {
                    charBox.className = "w-12 h-12 sm:w-14 sm:h-14 bg-white border-2 border-[#e6dfd5] rounded-2xl flex items-center justify-center text-2xl sm:text-3xl font-black text-[#4a3319] shadow-sm";
                    charBox.innerText = word[i];
                }
                wordDisplay.appendChild(charBox);
            }

            const lettersSet = new Set([missingLetterChar]);
            const alphabet = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
            while (lettersSet.size < 4) {
                const randomChar = alphabet[Math.floor(Math.random() * alphabet.length)];
                lettersSet.add(randomChar);
            }

            const choicesArray = Array.from(lettersSet).sort(() => Math.random() - 0.5);
            const choicesContainer = document.getElementById('letterChoices');
            choicesContainer.innerHTML = '';

            choicesArray.forEach((letter, index) => {
                const bubble = document.createElement('button');
                const delay = (index * 0.3).toFixed(1);
                bubble.className = "bubble-animation w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-white hover:bg-amber-50 border-3 border-amber-300 hover:border-amber-400 text-[#4a3319] font-black text-2xl sm:text-3xl flex items-center justify-center shadow-md active:scale-90 transition-all";
                bubble.style.animationDelay = `${delay}s`;
                bubble.innerText = letter;
                bubble.onclick = () => checkAnswer(letter, bubble);
                choicesContainer.appendChild(bubble);
            });
        }

        function checkAnswer(letter, bubble) {
            if (letter === missingLetterChar) {
                playSfx('correct');
                bubble.className = "w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-emerald-500 border-3 border-emerald-600 text-white font-black text-2xl sm:text-3xl flex items-center justify-center shadow-lg scale-105 transition-all";
                bubble.style.animation = "none";
                
                const missingBox = document.getElementById('missingBox');
                missingBox.innerText = missingLetterChar;
                missingBox.className = "w-12 h-12 sm:w-14 sm:h-14 bg-emerald-50 border-3 border-emerald-500 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl font-black text-emerald-600 shadow-md scale-105 transition-all";
                
                document.querySelectorAll('#letterChoices button').forEach(btn => btn.disabled = true);

                const randomPhrase = successPhrases[Math.floor(Math.random() * successPhrases.length)];
                document.getElementById('motivationalMessage').innerText = randomPhrase;

                setTimeout(() => {
                    currentWordIndex++;
                    updateProgress();
                    if (currentWordIndex >= totalRounds) {
                        triggerVictory();
                    } else {
                        loadRound();
                    }
                }, 1400);
            } else {
                playSfx('wrong');
                bubble.className = "bubble-animation w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-rose-100 border-3 border-rose-400 text-rose-600 font-black text-2xl sm:text-3xl flex items-center justify-center shadow-md animate-shake";
                setTimeout(() => bubble.classList.remove('animate-shake'), 400);
            }
        }

        function updateProgress() {
            const bar = document.getElementById('gameProgress');
            const counter = document.getElementById('roundCounter');
            bar.style.width = `${(currentWordIndex / totalRounds) * 100}%`;
            counter.innerText = `${currentWordIndex}/${totalRounds}`;
        }

        function triggerVictory() {
            playSfx('correct');
            startConfetti();
            const modal = document.getElementById('victoryModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function exitToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function startConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            container.classList.remove('hidden');
            const colors = ['#ffd54f', '#ffb300', '#ff6b6b', '#4ecdc4', '#a29bfe'];
            for (let i = 0; i < 35; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = `${Math.floor(Math.random() * 8) + 6}px`;
                piece.style.height = `${Math.floor(Math.random() * 12) + 8}px`;
                piece.style.left = `${Math.floor(Math.random() * 100)}vw`;
                piece.style.animationDuration = `${(Math.random() * 1.5 + 1.5).toFixed(1)}s`;
                container.appendChild(piece);
            }
        }
    </script>
</body>
</html>
