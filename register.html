<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - El Panal de la Abejita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importamos una tipografía redondeada, amigable y legible -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Iconos bonitos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="public/styles_register.css">
</head>
<body>

    <div class="register-container">
        <div class="header">
            <div class="header-icon">
                <i class="fa-solid fa-bee"></i>
            </div>
            <h2>¡Únete a la colmena!</h2>
            <p class="subtitle font-weight-bold">Crea tu cuenta para empezar a explorar</p>
        </div>
        
        <!-- Agregamos ID al formulario y modificamos su comportamiento para consumir el API -->
        <form id="registrationForm" onsubmit="handleRegistration(event)">
            <!-- Nombre Completo -->
            <div class="form-group">
                <label for="fullname">Nombre completo</label>
                <div class="input-wrapper">
                    <input type="text" id="fullname" name="fullname" required placeholder="Ej: Juan Pérez">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <!-- Correo Electrónico -->
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required placeholder="Ej: juan@ejemplo.com">
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>

            <!-- Confirmar Contraseña -->
            <div class="form-group">
                <label for="confirm-password">Confirmar contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Repite tu contraseña">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>

            <!-- Términos y condiciones -->
            <div class="terms-container">
                <input type="checkbox" id="terms" required>
                <label for="terms">Acepto los <a href="#terminos">Términos de servicio</a> y las políticas de la colmena.</label>
            </div>

            <!-- Botón de Registro -->
            <button type="submit" class="btn-register">Crear mi cuenta</button>
        </form>

        <!-- Redirección a Login -->
        <div class="footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        async function handleRegistration(event) {
            event.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("⚠️ Las contraseñas no coinciden.");
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullname, email, password })
                });
                const data = await response.json();

                if (data.success) {
                    // Guardamos la sesión del usuario padre en localStorage temporalmente
                    localStorage.setItem('logged_in_user_id', data.user.id);
                    localStorage.setItem('logged_in_user', data.user.name);
                    
                    // Redirigimos de forma segura a perfiles
                    window.location.href = 'perfiles.html';
                } else {
                    alert("⚠️ Error: " + data.error);
                }
            } catch (error) {
                console.error("Error de red:", error);
                // Fallback para pruebas offline si no está levantado el servidor
                localStorage.setItem('logged_in_user_id', 'mock-user-123');
                localStorage.setItem('logged_in_user', fullname);
                window.location.href = 'perfiles.html';
            }
        }
    </script>
</body>
</html>
