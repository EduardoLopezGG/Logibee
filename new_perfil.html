<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="public/styles_login_more.css">    
</head>
<body>
    <div class="login-container">
        <h2>Nuevo Perfil</h2>
        
        <form action="#" method="POST">
            <!-- Nombre -->
            <div class="input-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">
            </div>

            <!-- Usuario -->
            <div class="input-group">
                <label for="username">Usuario o Correo Electrónico</label>
                <input type="text" id="username" name="username" required placeholder="Ej: juan123">
            </div>

            <!-- Contraseña -->
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <!-- ¿Olvidaste tu contraseña? -->
            <div class="actions">
                <a href="#recuperar">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón de Ingresar -->
            <button type="submit" class="btn-login"><a href="seleccion de perfiles.html">Ingresar</a></button>
        </form>

        <!-- Registro si no tiene cuenta -->
        <div class="footer">
            ¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

</body>
</html>
